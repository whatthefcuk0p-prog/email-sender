<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container border">
        <h1 class="text-center">Email Sender</h1>
        <p class="text-muted text-center">Send emails with attachments and HTML content</p>
        
        <div class="alert alert-info">
            Email configuration is managed via server environment variables.
        </div>

        <div class="mb-4 text-center">
            <button onclick="testConnection()" class="btn btn-primary">Test Email Connection</button>
        </div>

        <hr>

        <h3>Email Details</h3>
        <div class="mb-3">
            <label class="form-label">To:</label>
            <input type="email" id="to" class="form-control" placeholder="recipient@example.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Subject:</label>
            <input type="text" id="subject" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Message:</label>
            <textarea id="body" class="form-control" rows="5"></textarea>
        </div>
        <button onclick="sendEmail()" class="btn btn-success w-100">Send Email</button>
    </div>

    <script>
        async function testConnection() {
            alert("Checking connection...");
            // This would call your server to verify SMTP settings
        }

        async function sendEmail() {
            const data = {
                to: document.getElementById('to').value,
                subject: document.getElementById('subject').value,
                body: document.getElementById('body').value
            };

            const response = await fetch('/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Email sent successfully!");
            } else {
                alert("Failed to send email.");
            }
        }
    </script>
</body>
</html>
